<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Loan Offers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── App shell ─────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Status bar (static demo) -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <span class="status-title">Loan Offers</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <rect x="0"    y="5"   width="2.5" height="6"    rx="0.8" fill="currentColor" opacity="0.4"/>
          <rect x="4"    y="3.5" width="2.5" height="7.5"  rx="0.8" fill="currentColor" opacity="0.6"/>
          <rect x="8"    y="1.5" width="2.5" height="9.5"  rx="0.8" fill="currentColor" opacity="0.8"/>
          <rect x="12"   y="0"   width="2.5" height="11"   rx="0.8" fill="currentColor"/>
        </svg>
        <div class="battery-icon">
          <div class="battery-fill"></div>
          <div class="battery-tip"></div>
        </div>
      </div>
    </div>

    <!-- Page header -->
    <header class="page-header">
      <div class="page-header__left">
        <h1 class="page-title">Personal Loans</h1>
        <p class="page-subtitle" id="offer-count">3 offers · sorted by approval</p>
      </div>
      <span class="badge badge--success">Pre-approved</span>
    </header>

    <!-- Scrollable card list -->
    <main class="card-list" id="card-list">
      <!-- Cards injected by app.js -->
    </main>

  </div><!-- /app-shell -->


  <!-- ── Overlay ────────────────────────────────────────────── -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>


  <!-- ── Bottom sheet ──────────────────────────────────────── -->
  <aside class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true" aria-label="Loan details">
    <div class="sheet-handle-bar">
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-body" id="sheet-body">
      <!-- Content injected by app.js when a card is opened -->
    </div>
  </aside>


  <!-- ── Scripts ───────────────────────────────────────────── -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
